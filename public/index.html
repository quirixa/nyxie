<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>nyxie</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: #0d0d0e;
      color: #f0f0f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background-image: radial-gradient(circle at 20% 30%, #1a1a1f 0%, #0d0d0e 80%);
    }
    .wrap {
      max-width: 640px;
      text-align: center;
    }
    .brand {
      font-size: 4.2rem;
      font-weight: 700;
      letter-spacing: -0.04em;
      background: linear-gradient(135deg, #b7a9ff 0%, #7c9bff 80%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
      line-height: 1.1;
    }
    .tagline {
      font-size: 1.1rem;
      font-weight: 400;
      color: #888;
      margin-bottom: 40px;
      letter-spacing: 0.3px;
    }
    .links {
      display: flex;
      gap: 24px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .links a {
      display: inline-block;
      padding: 12px 32px;
      border-radius: 40px;
      font-weight: 600;
      font-size: 1rem;
      text-decoration: none;
      transition: all 0.2s ease;
      background: #2a2a30;
      color: #e0e0e0;
      border: 1px solid #3a3a42;
    }
    .links a:hover {
      background: #3a3a44;
      border-color: #5a5a68;
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }
    .links a.primary {
      background: #5865f2;
      border-color: #5865f2;
      color: #fff;
    }
    .links a.primary:hover {
      background: #4752c4;
      border-color: #4752c4;
    }
    .footer {
      margin-top: 48px;
      font-size: 0.85rem;
      color: #555;
    }
    @media (max-width: 480px) {
      .brand { font-size: 3rem; }
      .links a { padding: 10px 24px; font-size: 0.9rem; }
    }
  </style>
</head>
<body>
<div class="wrap">
  <div class="brand">nyxie</div>
  <div class="tagline">private · encrypted · simple</div>
  <div class="links">
    <a href="login.html" class="primary">Sign in</a>
    <a href="register.html">Sign up</a>
  </div>
  <div class="footer">secure messaging for everyone</div>
</div>
</body>
</html>
